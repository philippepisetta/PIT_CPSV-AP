<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPSV‑AP Lab — PIT Wallonie</title>
  <meta name="description" content="Interface premium d'exploration et d'encodage du modèle sémantique CPSV‑AP pour la plateforme d'intelligence territoriale (PIT)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
  <h1>CPSV‑AP Lab — PIT Wallonie</h1>
  <button id="theme-toggle" class="btn-secondary" aria-label="Basculer le thème">🌙</button>
</header>
<main class="container">
  <aside class="sidebar" id="service-list">
    <h2>Services publics</h2>
    <ul></ul>
  </aside>
  <section class="graph-area" id="graph-canvas">
    <div id="graph-wrapper" style="width:100%;height:100%;">
      <svg id="ortho-graph" class="ortho-graph"></svg>
    </div>
  </section>
  <aside class="inspector" id="inspector-panel">
    <h2>Détails</h2>
    <div class="details"></div>
  </aside>
</main>
  <footer class="footer">
    <button id="open-encoder" class="btn-primary">Encoder un nouveau service</button>
    <button id="view-jsonld" class="btn-secondary">Voir JSON‑LD</button>
  </footer>

  <!-- Modal for l'encodage avec navigation par onglets -->
  <div id="encoder-modal" class="modal hidden">
    <div class="modal-content glass">
      <span class="close" id="close-encoder">&times;</span>
      <h2>Encoder un service public</h2>
      <div class="tabs">
        <button class="tab active" data-tab="basic">Infos de base</button>
        <button class="tab" data-tab="relations">Relations</button>
        <button class="tab" data-tab="exigences">Exigences</button>
        <button class="tab" data-tab="sorties">Sorties</button>
        <button class="tab" data-tab="coûts">Coûts</button>
        <button class="tab" data-tab="contacts">Contacts</button>
      </div>
      <form id="encoder-form">
        <div class="tab-content" id="tab-basic">
          <h3>Informations de base</h3>
          <label>Nom: <input name="name" required></label><br/>
          <label>Code: <input name="code"></label><br/>
          <label>Description: <textarea name="description"></textarea></label><br/>
          <label>Organisation: <select name="organizationId" required></select></label><br/>
        </div>
        <div class="tab-content hidden" id="tab-relations">
          <h3>Relations multiples</h3>
          <div id="relations-fields"></div>
        </div>
        <div class="tab-content hidden" id="tab-exigences">
          <h3>Exigences (JSON)</h3>
          <textarea name="requirements" placeholder='[ {"name":"Exigence 1", "evidences":[{"name":"Epreuve"}] } ]' rows="5"></textarea>
        </div>
        <div class="tab-content hidden" id="tab-sorties">
          <h3>Sorties (JSON)</h3>
          <textarea name="outputs" placeholder='[ {"name":"Sortie 1"} ]' rows="4"></textarea>
        </div>
        <div class="tab-content hidden" id="tab-coûts">
          <h3>Coûts (JSON)</h3>
          <textarea name="costs" placeholder='[ {"name":"Coût 1", "value": 100}]' rows="4"></textarea>
        </div>
        <div class="tab-content hidden" id="tab-contacts">
          <h3>Points de contact (JSON)</h3>
          <textarea name="contactPoints" placeholder='[ {"name":"Contact 1", "email":"mail@example.com"} ]' rows="4"></textarea>
        </div>
        <button type="submit" class="btn-primary">Soumettre</button>
      </form>
    </div>
  </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
